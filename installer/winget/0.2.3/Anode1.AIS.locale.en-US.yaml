ShortDescription: A personal, plain-text associative memory -- file anything under keys, recall it by keys.
Description: >-
  AIS (Associative Indexing Service) is an extension of your associative memory:
  file a link, a note, or a file path under one or more keys and recall it by
  those keys, the way your mind recalls -- by association. The store is
  append-only plain text on your own device: no server, no account, nothing
  phones home, and you can read or back it up by hand. One tiny native engine
  with a command line and a local (127.0.0.1-only) web GUI.
