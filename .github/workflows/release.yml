# Build AIS for every supported platform and publish the binaries to a GitHub
# Release -- triggered by pushing a version tag. Binaries are NOT kept in git;
# they are reproducible artifacts attached to the tagged commit, each with a
# SHA-256 checksum so they stay verifiable.
#
# Trigger: any tag matching v* (e.g. v0.1.0, v1.2.3). It is a PATTERN, not a
# fixed list -- a tag like `nightly` or `wip` will NOT start a release. Tighten
# to strict semver by changing the pattern to 'v[0-9]+.[0-9]+.[0-9]+'.
#
# You can also run it by hand from the Actions tab (workflow_dispatch) to test
# the build matrix WITHOUT publishing a release (the publish step is tag-only).

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual run for testing (builds, but does not publish)

permissions:
  contents: write           # required to create the Release and upload assets

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - { os: ubuntu-latest,    name: linux-x86_64, make: static }
          - { os: ubuntu-24.04-arm, name: linux-arm64,  make: static }
          - { os: macos-latest,     name: macos-arm64,  make: all }
          # Intel macs (macos-x86_64 via macos-13) dropped for now: Apple-silicon
          # only. Re-add `{ os: macos-13, name: macos-x86_64, make: all }` if needed.
    steps:
      - uses: actions/checkout@v4

      - name: build and test
        run: |
          make check                 # builds the engine + runs the unit tests
          make clean                 # pristine relink, so -static actually takes effect
          make ${{ matrix.make }}    # static on Linux, dynamic (portable) on macOS
          ./ais --version

      - name: stage binary + checksum
        run: |
          mkdir -p dist
          bin="ais-${{ github.ref_name }}-${{ matrix.name }}"
          cp ais "dist/$bin"
          ( cd dist && shasum -a 256 "$bin" > "$bin.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: ais-${{ matrix.name }}
          path: dist/*

  # Windows is its own job: ais here is a Cygwin build (links cygwin1.dll), so it
  # needs a Cygwin toolchain and ships as a ZIP (the runtime DLL + launcher must
  # travel with the exe) rather than a bare binary like the unix targets. A
  # native, Cygwin-free build is left as a future contribution (MSVC or mingw +
  # a POSIX->Winsock port -- see scripts/dist.sh notes).
  build-windows:
    name: build windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Compile with Cygwin's gcc and bundle cygwin1.dll beside ais.exe so the
      # package runs on any Windows with NO Cygwin install. 'zip' packages it.
      - name: set up Cygwin
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: gcc-core, make, zip

      # CHERE_INVOKING keeps `bash --login` in the checkout dir instead of $HOME.
      - name: build, test, package
        env:
          CHERE_INVOKING: '1'
        shell: C:\cygwin\bin\bash.exe --login -eo pipefail -o igncr '{0}'
        run: |
          make check                 # build the engine + run the unit/CLI tests
          ./ais --version
          sh scripts/dist.sh bin     # canonical Windows bundle (ais.exe + cygwin1.dll + gui/ais-web.bat + docs) -> releases/windows/*.zip
          # Re-stamp with the tag to match the unix jobs' naming and add a
          # SHA-256 sidecar (dist.sh names by its own VERSION and emits .md5).
          src=$(ls releases/windows/ais-*-windows-*.zip | head -n1)
          name="ais-${GITHUB_REF_NAME}-windows-x86_64"
          mkdir -p dist
          cp "$src" "dist/$name.zip"
          ( cd dist && sha256sum "$name.zip" > "$name.zip.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: ais-windows-x86_64
          path: dist/*

  publish:
    name: publish release
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # only on a real tag, never on a manual test run
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true       # flatten every platform's artifacts into dist/

      - name: publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
