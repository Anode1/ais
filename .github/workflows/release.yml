# Build AIS for every supported platform and publish the binaries to a GitHub
# Release -- triggered by pushing a version tag. Binaries are NOT kept in git;
# they are reproducible artifacts attached to the tagged commit, each with a
# SHA-256 checksum so they stay verifiable.
#
# Trigger: any tag matching v* (e.g. v0.1.0, v1.2.3). It is a PATTERN, not a
# fixed list -- a tag like `nightly` or `wip` will NOT start a release. Tighten
# to strict semver by changing the pattern to 'v[0-9]+.[0-9]+.[0-9]+'.
#
# You can also run it by hand from the Actions tab (workflow_dispatch) to test
# the build matrix WITHOUT publishing a release (the publish step is tag-only).

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual run for testing (builds, but does not publish)

permissions:
  contents: write           # required to create the Release and upload assets

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # one platform failing must not cancel the others
      matrix:
        include:
          - { os: ubuntu-latest,    name: linux-x86_64, make: static }
          - { os: ubuntu-24.04-arm, name: linux-arm64,  make: static }
          - { os: macos-latest,     name: macos-arm64,  make: all }
          # Intel macs (macos-x86_64 via macos-13) dropped for now: Apple-silicon
          # only. Re-add `{ os: macos-13, name: macos-x86_64, make: all }` if needed.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags so `git describe` sees the tag

      - name: build and test
        run: |
          make check                 # builds the engine + runs the unit/CLI tests
          ./ais --version

      - name: package bundle + checksum
        run: |
          # One zip per platform: the ais binary (CLI) + GUI launcher
          # + docs + man/. dist.sh picks static (Linux) / dynamic (macOS)
          # by uname, so the matrix `make` field is no longer needed here.
          sh scripts/dist.sh bin
          src=$(ls releases/*/ais-*.zip | head -n1)
          name="ais-${{ github.ref_name }}-${{ matrix.name }}"
          mkdir -p dist
          cp "$src" "dist/$name.zip"
          ( cd dist && shasum -a 256 "$name.zip" > "$name.zip.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: ais-${{ matrix.name }}
          path: dist/*

  # Windows ships the NATIVE build (Cygwin-free): the engine and the Win32 GUI are
  # cross-compiled with MinGW-w64 into self-contained ais.exe (CLI) + ais-gui.exe
  # (desktop app), using the win.h/win.c shims (Winsock, flock->LockFileEx, etc.).
  # No cygwin1.dll, no .NET, no runtime. ISCC (the installer compiler) needs
  # Windows, so the build is split: cross-compile here on Linux, assemble the
  # installer on windows-latest. (The Cygwin shipping path has been removed
  # entirely -- there are effectively no Cygwin users to serve.)
  windows-native:
    name: cross-compile native windows (mingw-w64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags so `git describe` sees the tag
      - name: install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 zip
      - name: cross-compile native CLI + GUI (static, self-contained)
        run: |
          make -C c clean
          # gnu99 (not strict c99) so MinGW's <windows.h> isn't hidden by
          # __STRICT_ANSI__; -static folds in libgcc so the exe stands alone.
          make -C c CC=x86_64-w64-mingw32-gcc AIS_STD=-std=gnu99 \
                    BIN=ais.exe LDFLAGS=-static LDLIBS="-lws2_32 -lshell32"
          make -C win32 CC=x86_64-w64-mingw32-gcc
          file c/ais.exe win32/ais-gui.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ais-windows-native-bin
          path: |
            c/ais.exe
            win32/ais-gui.exe

      # The PRIMARY Windows download: a portable zip (native exes + docs). No
      # installer, no registry -- unzip, double-click ais-gui.exe; delete the
      # folder to uninstall. Same xcopy/zip model as the linux/macos bundles.
      - name: package portable zip (delete-to-uninstall)
        run: |
          name="ais-${{ github.ref_name }}-windows-x86_64"
          mkdir -p "stage/$name"
          cp c/ais.exe win32/ais-gui.exe gui/ais-web.bat COPYING doc/about.txt doc/USING.txt "stage/$name/"
          cp installer/README-portable.txt "stage/$name/README.txt"
          ( cd stage && zip -rq "$name.zip" "$name" && sha256sum "$name.zip" > "$name.zip.sha256" )
          ls -l stage
      - uses: actions/upload-artifact@v4
        with:
          name: ais-windows-portable
          path: |
            stage/*.zip
            stage/*.zip.sha256

  # Assemble the per-user installer from the native exes (Inno Setup; ISCC is a
  # native Windows tool). Start-Menu shortcut -> the native GUI (ais-gui.exe);
  # ais.exe goes on PATH only (no console-flashing CLI shortcut). Per-user install
  # to %LOCALAPPDATA%\Programs\AIS, no admin prompt.
  build-windows:
    name: build windows installer (native)
    needs: windows-native
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: get native exes
        uses: actions/download-artifact@v4
        with:
          name: ais-windows-native-bin
          path: native
      - name: build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = "${{ github.ref_name }}" -replace '^v',''   # numeric, for Inno AppVersion
          # assemble the installer source dir (native, Cygwin-free)
          New-Item -ItemType Directory -Force -Path src | Out-Null
          Copy-Item native\c\ais.exe         src\ais.exe
          Copy-Item native\win32\ais-gui.exe src\ais-gui.exe
          Copy-Item icons\ais.ico            src\ais.ico
          Copy-Item COPYING                  src\COPYING
          Copy-Item doc\about.txt            src\about.txt
          Copy-Item doc\USING.txt            src\USING.txt
          Copy-Item installer\README.txt     src\README.txt
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DSrcDir="$((Resolve-Path src).Path)" /DAppVersion="$ver" installer\ais.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          $setup = Get-ChildItem installer\Output\*installer.exe | Select-Object -First 1
          $name = "ais-${{ github.ref_name }}-windows-x86_64-installer.exe"   # double-click to install
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item $setup.FullName "dist\$name"
          ((Get-FileHash "dist\$name" -Algorithm SHA256).Hash.ToLower() + "  $name") | Out-File -Encoding ascii "dist\$name.sha256"

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ais-windows-x86_64
          path: dist/*

  # Code-sign the Windows installer with SignPath (free for open-source). Runs
  # ONLY when SignPath is configured (repo variable SIGNPATH_ORGANIZATION_ID set);
  # otherwise it is skipped and the release ships unsigned (SmartScreen warns).
  # Setup + the required secrets/variables: doc/dev/SIGNING.md.
  sign-windows:
    name: sign Windows installer (SignPath)
    needs: build-windows
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') && vars.SIGNPATH_ORGANIZATION_ID != '' }}
    permissions:
      id-token: write     # OIDC trust between SignPath and this run
      contents: read
      actions: read       # let SignPath fetch the build artifact to sign
    steps:
      - name: submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ needs.build-windows.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - name: refresh checksum for the signed installer
        run: |
          cd signed
          for f in *-windows-x86_64-installer.exe; do
            [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ais-windows-signed
          path: signed/*

  # Android: the Flutter app (FFI to the C engine). The .apk is the installable
  # build a phone user sideloads from the release; the .aab is the Google Play
  # upload bundle (Play requires .aab; see doc/HOWTO_playstore.md). Release-signed
  # when the keystore secrets are set; otherwise debug-signed (gradle fallback).
  android:
    name: build android apk (flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: optional release signing (only if the keystore secret is set)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/app/flutter/android/release.jks"
            cat > app/flutter/android/key.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/app/flutter/android/release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
            echo "release signing configured"
          else
            echo "no ANDROID_KEYSTORE_BASE64 secret; building debug-signed (gradle fallback)"
          fi
      - name: build apk + play bundle
        working-directory: app/flutter
        run: |
          flutter pub get
          flutter build apk --release
          flutter build appbundle --release   # .aab for the Play Store
      - name: verify the C engine (libais.so) is bundled per ABI
        run: |
          # FFI loads lib/<device-abi>/libais.so; a missing ABI = runtime crash on
          # recall/store. Fail loudly here rather than ship a half-working apk.
          apk=app/flutter/build/app/outputs/flutter-apk/app-release.apk
          echo "native engine libs in the apk:"
          unzip -l "$apk" | grep -E 'lib/.*/libais\.so' || true
          unzip -l "$apk" | grep -q 'lib/arm64-v8a/libais.so' \
            || { echo "ERROR: lib/arm64-v8a/libais.so missing from the apk"; exit 1; }
      - name: stage apk + aab + checksums
        run: |
          apk="ais-${{ github.ref_name }}-android.apk"
          aab="ais-${{ github.ref_name }}-android.aab"
          mkdir -p dist
          cp app/flutter/build/app/outputs/flutter-apk/app-release.apk "dist/$apk"
          cp app/flutter/build/app/outputs/bundle/release/app-release.aab "dist/$aab"
          ( cd dist && sha256sum "$apk" > "$apk.sha256" && sha256sum "$aab" > "$aab.sha256" )
      - uses: actions/upload-artifact@v4
        with:
          name: ais-android
          path: dist/*

  publish:
    name: publish release
    needs: [build, build-windows, sign-windows, android]
    runs-on: ubuntu-latest
    # always() so a SKIPPED sign-windows (SignPath not configured) doesn't skip
    # publish; still require the builds to have succeeded.
    if: >-
      ${{ always() && startsWith(github.ref, 'refs/tags/')
          && needs.build.result == 'success'
          && needs.build-windows.result == 'success'
          && needs.android.result == 'success'
          && (needs.sign-windows.result == 'success' || needs.sign-windows.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts          # each artifact lands in artifacts/<name>/

      - name: assemble release files (prefer the signed Windows installer)
        run: |
          mkdir -p dist
          for d in artifacts/*/; do
            [ "$d" = "artifacts/ais-windows-signed/" ] && continue
            cp -f "$d"* dist/ 2>/dev/null || true
          done
          # overlay the SignPath-signed installer + checksum, if the sign job ran
          if [ -d artifacts/ais-windows-signed ]; then
            cp -f artifacts/ais-windows-signed/* dist/
          fi
          ls -l dist

      - name: publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
