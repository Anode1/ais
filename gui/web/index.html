<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIS</title>
<style>
  body { font: 15px/1.45 system-ui, sans-serif; margin: 2rem auto; max-width: 640px; padding: 0 1rem; }
  h1 { font-size: 1.4rem; margin: 0 0 1rem; }
  .row { display: flex; gap: .5rem; }
  #q { flex: 1; font: inherit; padding: .6rem .8rem; }
  button { font: inherit; padding: .55rem 1rem; cursor: pointer; }
  #out { margin-top: 1rem; }
  .hit { padding: .5rem 0; border-bottom: 1px solid #eee; }
  .hit:last-child { border-bottom: 0; }
  .hit a { color: #1a0dab; text-decoration: none; }
  .muted { color: #777; }
  #addbtn { margin-top: 2rem; background: none; border: 0; color: #1a0dab; padding: 0; cursor: pointer; font: inherit; }
  #add { display: none; margin-top: .5rem; border-top: 1px solid #eee; padding-top: 1rem; }
  #add label { display: block; margin-top: .8rem; font-weight: 600; }
  #add textarea { width: 100%; box-sizing: border-box; font: inherit; padding: .5rem; height: 5rem; }
</style>
</head>
<body>
<h1>AIS</h1>

<!-- GET first: the frequent action -->
<div class="row">
  <input id="q" placeholder="type keys to recall…   e.g.  kul deploy" autofocus>
  <button onclick="get()">Get</button>
</div>
<div id="out"></div>

<!-- PUT second: behind a toggle that expands -->
<button id="addbtn" onclick="toggleAdd()">+ add</button>
<div id="add">
  <label for="values">Values (one per line)</label>
  <textarea id="values" placeholder="a URL, a command, a path…"></textarea>
  <button onclick="put()">Put values</button>
  <label for="doc">Document (saved as a file)</label>
  <textarea id="doc"></textarea>
  <button onclick="addDoc()">Add document</button>
  <div id="addmsg" class="muted" style="margin-top:.5rem"></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const keys = () => $('q').value;

  // search-result list: a "N results for Q - T ms" header (v1 style), then one
  // value per line, URLs clickable (Google-style)
  function render(o, q, ms) {
    const box = $('out'); box.innerHTML = '';
    if (o.err) { const d = document.createElement('div'); d.className = 'muted'; d.textContent = o.err; box.appendChild(d); return; }
    const lines = (o.out || '').split('\n').filter(s => s.length);
    const head = document.createElement('div'); head.className = 'muted';
    head.textContent = lines.length + ' result' + (lines.length === 1 ? '' : 's')
      + (q.trim() ? ' for ' + q.trim() : '') + ' - ' + ms.toFixed(1) + ' ms';
    box.appendChild(head);
    for (const ln of lines) {
      const bar = ln.indexOf('|');
      const value = bar >= 0 ? ln.slice(bar + 1) : ln;   // drop the id| prefix
      const div = document.createElement('div'); div.className = 'hit';
      if (/^https?:\/\//.test(value)) {
        const a = document.createElement('a');
        a.href = value; a.target = '_blank'; a.rel = 'noopener'; a.textContent = value;
        div.appendChild(a);
      } else { div.textContent = value; }
      box.appendChild(div);
    }
  }

  async function post(path, body) {
    const r = await fetch(path, { method: 'POST',
      headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }

  async function get() {
    const q = keys();
    const t0 = performance.now();
    const r = await fetch('/api/get?keys=' + encodeURIComponent(q));
    render(await r.json(), q, performance.now() - t0);
  }
  async function put() {
    const o = await post('/api/put', { keys: keys(), values: $('values').value });
    $('addmsg').textContent = (o.out || '') + (o.err || ''); $('values').value = '';
  }
  async function addDoc() {
    const o = await post('/api/doc', { keys: keys(), text: $('doc').value });
    $('addmsg').textContent = (o.out || '') + (o.err || ''); $('doc').value = '';
  }
  function toggleAdd() {
    const a = $('add');
    a.style.display = a.style.display === 'block' ? 'none' : 'block';
    $('addbtn').textContent = a.style.display === 'block' ? '− add' : '+ add';
  }
  $('q').addEventListener('keydown', e => { if (e.key === 'Enter') get(); });
</script>
</body>
</html>
