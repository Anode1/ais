<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0dab">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
<title>AIS</title>

<header><h1>AIS</h1></header>

<div class="bar">
  <input id="q" type="search" enterkeyhint="search" placeholder="ask or type keys…" autocomplete="off" autofocus>
  <button id="mic" class="icon" title="Speak" aria-label="Speak">🎤</button>
  <button id="go" class="icon" title="Recall" aria-label="Recall">↵</button>
</div>

<div id="out"></div>

<button id="addbtn">+ add</button>
<div id="add">
  <textarea id="v" placeholder="values, one per line"></textarea>
  <button id="putbtn">Put values</button> <span id="m" class="muted"></span>
</div>

<script>
// Thin client over `ais serve`: same /api/get and /api/put the desktop page uses.
// No framework, no build step -- plain files, edit and reload.
var $ = function (i) { return document.getElementById(i); };

function render(text, q, ms) {
  var b = $('out'); b.innerHTML = '';
  var lines = text.split('\n').filter(function (s) { return s.length; });
  var h = document.createElement('div'); h.className = 'muted';
  h.textContent = lines.length + ' result' + (lines.length == 1 ? '' : 's') +
                  (q ? ' for ' + q : '') + ' · ' + ms.toFixed(0) + ' ms';
  b.appendChild(h);
  lines.forEach(function (ln) {
    var p = ln.indexOf('|'), v = p >= 0 ? ln.slice(p + 1) : ln;
    var d = document.createElement('div'); d.className = 'hit';
    if (v.slice(0, 4) == 'http') {
      var a = document.createElement('a');
      a.href = v; a.target = '_blank'; a.rel = 'noopener'; a.textContent = v;
      d.appendChild(a);
    } else { d.textContent = v; }
    b.appendChild(d);
  });
}

async function get() {
  var q = $('q').value.trim(); if (!q) return;
  var t0 = performance.now();
  var t = await (await fetch('/api/get?keys=' + encodeURIComponent(q))).text();
  render(t, q, performance.now() - t0);
}
async function put() {
  $('m').textContent = await (await fetch('/api/put?keys=' + encodeURIComponent($('q').value),
                       { method: 'POST', body: $('v').value })).text();
  $('v').value = '';
}

$('go').onclick = get;
$('putbtn').onclick = put;
$('addbtn').onclick = function () { $('add').classList.toggle('open'); };
$('q').addEventListener('keydown', function (e) { if (e.key == 'Enter') get(); });

// Voice: the browser's own speech-to-text -> keys -> recall. Chrome/Android have
// it; where it's absent (iOS Safari) we hide the mic and typing still works.
// Needs a secure context (https or localhost) -- see app/README.md.
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  var rec = new SR();
  rec.lang = navigator.language || 'en-US';
  rec.interimResults = false; rec.maxAlternatives = 1;
  $('mic').onclick = function () { try { rec.start(); } catch (e) {} };
  rec.onresult = function (e) { $('q').value = e.results[0][0].transcript; get(); };
} else {
  $('mic').style.display = 'none';
}

if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('/sw.js').catch(function () {});
</script>
