<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0dab">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg">
<link rel="stylesheet" href="/app.css">
<title>AIS</title>

<!-- frosted header: title + count, then a rounded search row (recall-first) -->
<header id="bar">
  <div class="titlerow"><span class="brand">AIS</span><span id="count" class="muted"></span></div>
  <div class="searchrow">
    <span class="sicon">&#128269;</span>
    <input id="q" type="search" enterkeyhint="search" placeholder="type keys to recall…" autocomplete="off" autofocus>
    <button id="mic" class="iconbtn" title="Speak" hidden>&#127908;</button>
  </div>
</header>

<main id="out"><p class="empty">Type keys, then Enter. Tap + Add to store.</p></main>

<button id="addbtn" class="fab">+ Add</button>

<!-- value-first Add sheet: what to remember, then optional keys -->
<div id="sheet" hidden>
  <div class="card">
    <h2>Add to your memory</h2>
    <textarea id="v" rows="3" placeholder="What to remember &mdash; a link, a note, a number&hellip;"></textarea>
    <input id="vk" placeholder="Keys (space-separated, optional)">
    <div class="actions">
      <button id="cancel" class="ghost">Cancel</button>
      <button id="save" class="primary">Save</button>
    </div>
  </div>
</div>

<script>
var $ = function (i) { return document.getElementById(i); };

function isUrl(v){ return v.slice(0,7)=='http://' || v.slice(0,8)=='https://'; }

function render(text, q, ms) {
  var lines = text.split('\n').filter(function (s){ return s.length; });
  $('count').textContent = lines.length + ' result' + (lines.length==1?'':'s') + ' · ' + ms.toFixed(0) + ' ms';
  var out = $('out'); out.innerHTML = '';
  if (!lines.length) { out.innerHTML = '<p class="empty">No results for "' + q + '"</p>'; return; }
  lines.forEach(function (ln) {
    var p = ln.indexOf('|'), v = p>=0 ? ln.slice(p+1) : ln;
    var row = document.createElement('div'); row.className = 'hit';
    var span = document.createElement(isUrl(v) ? 'a' : 'span');
    span.textContent = v;
    if (isUrl(v)) { span.href = v; span.target = '_blank'; span.rel = 'noopener'; }
    row.appendChild(span);
    out.appendChild(row);
  });
}

async function recall() {
  var q = $('q').value.trim(); if (!q) return;
  var t0 = performance.now();
  var t = await (await fetch('/api/get?keys=' + encodeURIComponent(q))).text();
  render(t, q, performance.now() - t0);
}

function openSheet(){ $('vk').value = $('q').value.trim(); $('sheet').hidden = false; $('v').focus(); }
function closeSheet(){ $('sheet').hidden = true; $('v').value = ''; }

async function save() {
  var value = $('v').value.trim(); if (!value) return;
  var keys = $('vk').value.trim();
  await fetch('/api/put?keys=' + encodeURIComponent(keys), { method:'POST', body:value });
  closeSheet();
  $('q').value = keys; recall();          // show what was just saved
}

$('q').addEventListener('keydown', function (e){ if (e.key=='Enter') recall(); });
$('addbtn').onclick = openSheet;
$('cancel').onclick = closeSheet;
$('save').onclick = save;
$('sheet').addEventListener('click', function(e){ if (e.target == $('sheet')) closeSheet(); });

// voice: the browser's speech-to-text -> keys -> recall (Android Chrome; absent
// on iOS Safari, where we just hide the mic). Needs a secure context.
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  var rec = new SR(); rec.lang = navigator.language || 'en-US'; rec.interimResults = false;
  $('mic').hidden = false;
  $('mic').onclick = function(){ try { rec.start(); } catch(e){} };
  rec.onresult = function(e){ $('q').value = e.results[0][0].transcript; recall(); };
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
