<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a0dab">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.png">
<link rel="stylesheet" href="/app.css">
<title>AIS</title>

<!-- frosted header: title + count, then a rounded search row (recall-first) -->
<header id="bar">
  <div class="titlerow"><span class="brand">AIS</span><span id="count" class="muted"></span></div>
  <div class="searchrow">
    <span class="sicon">&#128269;</span>
    <input id="q" type="search" enterkeyhint="search" placeholder="type keys to recall…" autocomplete="off" autofocus>
    <button id="mic" class="iconbtn" title="Speak" hidden>&#127908;</button>
  </div>
  <div class="seg">
    <button id="seg-recall" class="segbtn active">Recall</button>
    <button id="seg-timeline" class="segbtn">Timeline</button>
    <button id="seg-tags" class="segbtn">Tags</button>
  </div>
  <div class="storerow"><span id="store" class="muted"></span><button id="storebtn" class="link">change</button></div>
</header>

<main id="out"><p class="empty">Type keys, then Enter. Tap + Add to store.</p></main>

<button id="addbtn" class="fab">+ Add</button>

<!-- value-first Add sheet: what to remember, then optional keys -->
<div id="sheet" hidden>
  <div class="card">
    <h2>Add to your memory</h2>
    <textarea id="v" rows="3" placeholder="What to remember &mdash; a link, a note, a number&hellip;"></textarea>
    <input id="vk" placeholder="Keys (space-separated, optional)">
    <div class="actions">
      <button id="cancel" class="ghost">Cancel</button>
      <button id="save" class="primary">Save</button>
    </div>
  </div>
</div>

<script>
var $ = function (i) { return document.getElementById(i); };
var view = 'recall';

function isUrl(v){ return v.slice(0,7)=='http://' || v.slice(0,8)=='https://'; }

function render(text, q, ms) {
  var lines = text.split('\n').filter(function (s){ return s.length; });
  $('count').textContent = lines.length + ' result' + (lines.length==1?'':'s') + ' · ' + ms.toFixed(0) + ' ms';
  var out = $('out'); out.innerHTML = '';
  if (!lines.length) { out.innerHTML = '<p class="empty">No results for "' + q + '"</p>'; return; }
  lines.forEach(function (ln) {
    var p = ln.indexOf('|'), v = p>=0 ? ln.slice(p+1) : ln;
    var row = document.createElement('div'); row.className = 'hit';
    var span = document.createElement(isUrl(v) ? 'a' : 'span');
    span.textContent = v;
    if (isUrl(v)) { span.href = v; span.target = '_blank'; span.rel = 'noopener'; }
    row.appendChild(span);
    out.appendChild(row);
  });
}

async function recall() {
  var q = $('q').value.trim(); if (!q) return;
  var t0 = performance.now();
  var t = await (await fetch('/api/get?keys=' + encodeURIComponent(q))).text();
  render(t, q, performance.now() - t0);
}

// timeline: id|ts|keys|value (value may contain '|', so split off the first 3)
function parseTL(ln) {
  var a = ln.indexOf('|'), b = ln.indexOf('|', a+1), c = ln.indexOf('|', b+1);
  return { ts: ln.slice(a+1, b), keys: ln.slice(b+1, c), value: ln.slice(c+1) };
}
function fmtDay(d) {
  var p = d.split('-'),
      M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return p[2] + ' ' + M[(+p[1]) - 1] + ' ' + p[0];
}
async function loadTimeline() {
  var t = await (await fetch('/api/timeline')).text();
  var lines = t.split('\n').filter(function (s){ return s.length; });
  var out = $('out'); out.innerHTML = '';
  $('count').textContent = lines.length + ' record' + (lines.length==1?'':'s');
  if (!lines.length) { out.innerHTML = '<p class="empty">Nothing saved yet.</p>'; return; }
  var day = null;
  lines.forEach(function (ln) {
    var r = parseTL(ln), d = r.ts ? r.ts.slice(0, 10) : '';
    if (d !== day) {
      day = d;
      var h = document.createElement('div'); h.className = 'daygroup';
      h.textContent = d ? fmtDay(d) : '(undated)';
      out.appendChild(h);
    }
    var row = document.createElement('div'); row.className = 'hit';
    var s = document.createElement(isUrl(r.value) ? 'a' : 'span');
    s.textContent = r.value;
    if (isUrl(r.value)) { s.href = r.value; s.target = '_blank'; s.rel = 'noopener'; }
    row.appendChild(s);
    var m = document.createElement('div'); m.className = 'meta';
    var tm = r.ts.indexOf('T') >= 0 ? r.ts.slice(11, 16) + ' · ' : '';
    m.textContent = tm + (r.keys || '(no keys)');
    row.appendChild(m);
    out.appendChild(row);
  });
}
async function loadTags() {
  var t = await (await fetch('/api/tags')).text();
  var lines = t.split('\n').filter(function (s){ return s.length; });
  var out = $('out'); out.innerHTML = '';
  $('count').textContent = lines.length + ' tag' + (lines.length==1?'':'s');
  if (!lines.length) { out.innerHTML = '<p class="empty">No tags yet.</p>'; return; }
  lines.forEach(function (ln) {
    var p = ln.indexOf('|'), count = ln.slice(0, p), key = ln.slice(p+1);
    var row = document.createElement('div'); row.className = 'tagrow';
    var b = document.createElement('button'); b.className = 'taglink'; b.textContent = key;
    b.onclick = function () { $('q').value = key; setView('recall'); };
    var n = document.createElement('span'); n.className = 'tagcount'; n.textContent = count;
    row.appendChild(b); row.appendChild(n);
    out.appendChild(row);
  });
}
function setView(v) {
  view = v;
  ['recall','timeline','tags'].forEach(function (k) {
    $('seg-' + k).className = 'segbtn' + (k == v ? ' active' : '');
  });
  if (v == 'recall') {
    if ($('q').value.trim()) recall();
    else { $('out').innerHTML = '<p class="empty">Type keys, then Enter. Tap + Add to store.</p>'; $('count').textContent = ''; }
  } else if (v == 'timeline') loadTimeline();
  else loadTags();
}

function openSheet(){ $('vk').value = $('q').value.trim(); $('sheet').hidden = false; $('v').focus(); }
function closeSheet(){ $('sheet').hidden = true; $('v').value = ''; }

async function save() {
  var value = $('v').value.trim(); if (!value) return;
  var keys = $('vk').value.trim();
  await fetch('/api/put?keys=' + encodeURIComponent(keys), { method:'POST', body:value });
  closeSheet();
  $('q').value = keys; recall();          // show what was just saved
}

$('q').addEventListener('keydown', function (e){ if (e.key=='Enter') setView('recall'); });
$('seg-recall').onclick = function (){ setView('recall'); };
$('seg-timeline').onclick = function (){ setView('timeline'); };
$('seg-tags').onclick = function (){ setView('tags'); };
$('addbtn').onclick = openSheet;
$('cancel').onclick = closeSheet;
$('save').onclick = save;
$('sheet').addEventListener('click', function(e){ if (e.target == $('sheet')) closeSheet(); });

// voice: the browser's speech-to-text -> keys -> recall (Android Chrome; absent
// on iOS Safari, where we just hide the mic). Needs a secure context.
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  var rec = new SR(); rec.lang = navigator.language || 'en-US'; rec.interimResults = false;
  $('mic').hidden = false;
  $('mic').onclick = function(){ try { rec.start(); } catch(e){} };
  rec.onresult = function(e){ $('q').value = e.results[0][0].transcript; recall(); };
}

// show the current store, and let the user point at a different index
async function loadStore(){ $('store').textContent = 'store: ' + await (await fetch('/api/where')).text(); }
async function changeStore(){
  var cur = await (await fetch('/api/where')).text();
  var d = prompt('Index folder (full path):', cur);
  if (!d || d == cur) return;
  var r = await fetch('/api/store', { method:'POST', body:d });
  if (r.ok) { $('q').value=''; $('out').innerHTML='<p class="empty">Type keys to recall.</p>'; $('count').textContent=''; loadStore(); }
  else alert('Could not open that index');
}
$('storebtn').onclick = changeStore;
loadStore();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
